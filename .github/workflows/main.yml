---
name: maven-java workflow
on:
  push:
    branches:
      - master
jobs:
  job1 build:
    runs-on: ubuntu-latest
    steps:
      - name: clone reposotory
        uses: actions/checkout@v4
      - name: install java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: build java code
        run: mvn clean install package
        
